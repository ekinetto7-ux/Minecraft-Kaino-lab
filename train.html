<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RTM車両ダウンロード</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#0b0b0b;
color:white;
}

header{
background:#1b5e20;
padding:20px;
text-align:center;
font-size:28px;
}

.homebtn{
padding:15px;
}

.homebtn button{
padding:10px 20px;
font-size:16px;
background:#2196f3;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.section{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:40px;
}

.card{
background:#1c1c1c;
padding:25px;
border-radius:12px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card button{
margin-top:10px;
padding:12px 25px;
font-size:16px;
background:#4caf50;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<header>
🚆 RTM車両ダウンロード
</header>

<div class="homebtn">
<a href="index.html">
<button>← ホームに戻る</button>
</a>
</div>

<div class="section">

<div class="card">
<h2>東日本車両系列</h2>
<p>JR東日本の車両</p>
<button>ダウンロード</button>
</div>

<div class="card">
<h2>西日本車両系列</h2>
<p>JR西日本の車両</p>
<button>ダウンロード</button>
</div>

<div class="card">
<h2>北海道車両系列</h2>
<p>JR北海道の車両</p>
<button>ダウンロード</button>
</div>

<div class="card">
<h2>私鉄車両系列</h2>
<p>私鉄の車両</p>
<button>ダウンロード</button>
</div>

<div class="card">
<h2>路面電車系列</h2>
<p>路面電車</p>
<button>ダウンロード</button>
</div>

</div>

</body>
</html>
