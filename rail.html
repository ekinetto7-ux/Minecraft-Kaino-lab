<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RTMレール - マイクラ改造研究所</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#0b0b0b;
color:white;
}

/* タイトル */
header{
background:#1b5e20;
padding:20px;
text-align:center;
font-size:30px;
}

/* 上の説明 */
.top{
text-align:center;
padding:40px;
background:linear-gradient(#003366,#000);
}

/* カードエリア */
.rails{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px;
}

/* レールカード */
.card{
background:#1c1c1c;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,0.7);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
margin-top:10px;
}

button{
margin-top:10px;
padding:12px 25px;
font-size:16px;
background:#4caf50;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

button:hover{
background:#66bb6a;
}

footer{
text-align:center;
padding:20px;
background:#111;
}

</style>
</head>

<body>

<header>
🚆 RTMレールダウンロード
</header>

<div class="top">
<h1>レールを選んでダウンロード</h1>
<p>リアルな鉄道レールを追加できます</p>
</div>

<section class="rails">

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>直線レール</h3>
<p>基本的なRTMレール</p>
<button>ダウンロード</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>高速レール</h3>
<p>新幹線用レール</p>
<button>ダウンロード</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>分岐レール</h3>
<p>ポイント付きレール</p>
<button>ダウンロード</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>地下鉄レール</h3>
<p>地下鉄向けレール</p>
<button>ダウンロード</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>高架レール</h3>
<p>高架線用レール</p>
<button>ダウンロード</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>カーブレール</h3>
<p>カーブ用レール</p>
<button>ダウンロード</button>
</div>

</section>

<footer>
© マイクラ改造研究所
</footer>

</body>
</html>
