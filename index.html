<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>マイクラ改造研究所</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#1a1a1a,#0f0f0f);
color:white;
}

/* 上のバー */
header{
background:#2e7d32;
padding:20px;
font-size:30px;
font-weight:bold;
text-align:center;
}

/* メニュー */
nav{
display:flex;
justify-content:center;
background:#1b5e20;
}

nav a{
padding:15px 25px;
color:white;
text-decoration:none;
font-size:18px;
}

nav a:hover{
background:#4caf50;
}

/* ヒーロー */
.hero{
text-align:center;
padding:80px 20px;
background:url("https://images.unsplash.com/photo-1611605698335-8b1569810432");
background-size:cover;
}

.hero h1{
font-size:50px;
}

.hero button{
padding:15px 40px;
font-size:20px;
background:#4caf50;
border:none;
border-radius:10px;
color:white;
}

/* MODカード */
.mods{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:40px;
}

.card{
background:#222;
margin:20px;
padding:20px;
width:250px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.card button{
margin-top:10px;
padding:10px;
background:#4caf50;
border:none;
color:white;
border-radius:6px;
}

/* フッター */
footer{
background:#111;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>
</head>

<body>

<header>
🧪 マイクラ改造研究所
</header>

<nav>
<a href="#">ホーム</a>
<a href="#">MOD一覧</a>
<a href="#">MOD投稿</a>
<a href="#">人気MOD</a>
</nav>

<div class="hero">
<h1>Minecraft MOD配布サイト</h1>
<p>最高のMODをダウンロードしよう</p>
<button>MODを見る</button>
</div>

<section class="mods">

<div class="card">
<img src="https://via.placeholder.com/250">
<h3>電車MOD</h3>
<p>リアルな電車を追加</p>
<button>ダウンロード</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250">
<h3>建築MOD</h3>
<p>建築ブロック追加</p>
<button>ダウンロード</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250">
<h3>便利MOD</h3>
<p>ゲームを遊びやすく</p>
<button>ダウンロード</button>
</div>

</section>

<footer>
© マイクラ改造研究所
</footer>

</body>
</html>
