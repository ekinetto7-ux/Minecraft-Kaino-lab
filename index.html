<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>マイクラ改造研究所 RTMサイト</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#0d0d0d;
color:white;
}

/* 上のタイトル */
header{
background:#1b5e20;
padding:20px;
text-align:center;
font-size:28px;
}

/* メニュー */
nav{
display:flex;
justify-content:center;
background:#2e7d32;
}

nav a{
padding:15px 25px;
color:white;
text-decoration:none;
font-size:18px;
}

nav a:hover{
background:#4caf50;
}

/* トップ */
.hero{
text-align:center;
padding:80px 20px;
background:linear-gradient(#003366,#000);
}

.hero h1{
font-size:45px;
}

.hero button{
padding:15px 40px;
font-size:20px;
background:#4caf50;
border:none;
border-radius:10px;
color:white;
}

/* MODカード */
.mods{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:40px;
}

.card{
background:#1c1c1c;
margin:20px;
padding:20px;
width:260px;
border-radius:12px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.6);
}

.card img{
width:100%;
border-radius:10px;
}

.card button{
margin-top:10px;
padding:10px 20px;
background:#4caf50;
border:none;
border-radius:6px;
color:white;
}

footer{
text-align:center;
padding:20px;
background:#111;
}

</style>
</head>

<body>

<header>
🚆 マイクラ改造研究所
</header>

<nav>
<a href="#">ホーム</a>
<a href="#">RTM車両</a>
<a href="#">RTMレール</a>
<a href="#">RTM駅</a>
<a href="#">RTMマップ</a>
</nav>

<div class="hero">
<h1>RTM MOD配布サイト</h1>
<p>リアルな鉄道MODをダウンロードしよう</p>
<button>RTMを見る</button>
</div>

<section class="mods">

<div class="card">
<img src="https://via.placeholder.com/260">
<h3>JR車両パック</h3>
<p>JRの電車を追加</p>
<button>ダウンロード</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/260">
<h3>私鉄車両パック</h3>
<p>私鉄の電車追加</p>
<button>ダウンロード</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/260">
<h3>新幹線パック</h3>
<p>新幹線を追加</p>
<button>ダウンロード</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/260">
<h3>RTM駅パック</h3>
<p>駅ホームや設備</p>
<button>ダウンロード</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/260">
<h3>RTMレールパック</h3>
<p>リアルな線路</p>
<button>ダウンロード</button>
</div>

</section>

<footer>
© マイクラ改造研究所 RTMサイト
</footer>

</body>
</html>
